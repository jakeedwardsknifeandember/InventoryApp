<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knife and Ember - Admin Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #ffffff; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background-color: #1e1e1e; border: 1px solid #333; color: #fff; width: 100%; max-width: 400px; }
        .btn-primary { background-color: #d9534f; border: none; }
        .btn-primary:hover { background-color: #c9302c; }
    </style>
</head>
<body>
    <div class="card p-4 shadow">
        <h3 class="text-center mb-3">Admin Portal</h3>
        <p class="text-muted text-center small">Knife and Ember Food Consultancy</p>
        
        {% if error %}
            <div class="alert alert-danger py-2 small" role="alert">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" action="/admin/login">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control bg-dark text-light border-secondary" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control bg-dark text-light border-secondary" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 mt-2">Log In to Console</button>
        </form>
    </div>
</body>
</html>
