<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Knife and Ember</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #ffffff; padding: 2rem; }
        .card { background-color: #1e1e1e; border: 1px solid #333; color: #fff; }
        .table-dark { background-color: #1e1e1e; }
        .btn-primary { background-color: #d9534f; border: none; }
        .btn-primary:hover { background-color: #c9302c; }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Knife and Ember Client Management</h2>
            <a href="/admin/logout" class="btn btn-outline-light btn-sm">Log Out</a>
        </div>

        <div class="row g-4">
            <!-- Add New Client Form -->
            <div class="col-md-4">
                <div class="card p-3 shadow">
                    <h5 class="mb-3">Provision New Client Account</h5>
                    <form method="POST" action="/admin/create_client">
                        <div class="mb-3">
                            <label class="form-label small">Client Username</label>
                            <input type="text" name="username" class="form-control form-control-sm bg-dark text-light border-secondary" placeholder="e.g. urbanbrew" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">Initial Password</label>
                            <input type="password" name="password" class="form-control form-control-sm bg-dark text-light border-secondary" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">Status</label>
                            <select name="status" class="form-select form-select-sm bg-dark text-light border-secondary">
                                <option value="Active">Active</option>
                                <option value="Trial">Trial</option>
                                <option value="Suspended">Suspended</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary btn-sm w-100">Create / Update Account</button>
                    </form>
                </div>
            </div>

            <!-- Existing Clients Table -->
            <div class="col-md-8">
                <div class="card p-3 shadow">
                    <h5 class="mb-3">Registered Client Organizations</h5>
                    <div class="table-responsive">
                        <table class="table table-dark table-striped align-middle small">
                            <thead>
                                <tr>
                                    <th>Username</th>
                                    <th>Password</th>
                                    <th>Database Path</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for user in users %}
                                <tr>
                                    <td><strong>{{ user.username }}</strong></td>
                                    <td><code>{{ user.password }}</code></td>
                                    <td class="text-muted">{{ user.database }}</td>
                                    <td>
                                        <span class="badge {% if user.status == 'Active' %}bg-success{% elif user.status == 'Trial' %}bg-warning text-dark{% else %}bg-danger{% endif %}">
                                            {{ user.status }}
                                        </span>
                                    </td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
