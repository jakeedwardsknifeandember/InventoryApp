<!DOCTYPE html>
<html>
<head>
    <title>SaaS Portal Login</title>
    <style>
        body { font-family: Arial, sans-serif; background: #242424; color: #fff; text-align: center; padding-top: 150px; }
        .card { background: #2b2b2b; display: inline-block; padding: 40px; border-radius: 8px; width: 300px; text-align: left; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #242424; color: #fff; border: 1px solid #3a3a3a; border-radius: 4px; box-sizing: border-box; }
        input[type="submit"] { background: #3b8ed0; font-weight: bold; cursor: pointer; border: none; color: white; }
        input[type="submit"]:hover { background: #2a7caf; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Sign In</h2>
        {% if error %}
            <p style="color: #ff6b6b; font-size: 14px; font-weight: bold;">{{ error }}</p>
        {% endif %}
        
        <form method="post">
            <label>Username:</label>
            <input type="text" name="username" required autocomplete="off">
            
            <label>Password:</label>
            <input type="password" name="password" required>
            
            <input type="submit" value="Log In">
        </form>
    </div>
</body>
</html>
