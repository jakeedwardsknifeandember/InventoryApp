<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knife & Ember Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: #080304;
            background-image: radial-gradient(circle at 50% 30%, #20080a 0%, #080304 70%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Branding Header Section */
        .brand-header {
            text-align: center;
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Larger Logo Container */
        .brand-logo-wrapper {
            margin-bottom: 18px;
            width: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Direct Image Styling */
        .brand-logo {
            width: 100%;
            height: auto;
            max-height: 160px;
            object-fit: contain;
            filter: drop-shadow(0 0 16px rgba(255, 255, 255, 0.15)) drop-shadow(0 0 30px rgba(185, 28, 28, 0.45));
            transition: transform 0.3s ease;
        }

        .brand-logo:hover {
            transform: scale(1.03);
        }

        .brand-title {
            font-family: 'Cinzel', serif;
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #f3f4f6;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .brand-subtitle {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #991b1b;
            text-transform: uppercase;
        }

        /* Form Card */
        .login-card {
            width: 100%;
            background: #111113;
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        /* Role Selector Tabs */
        .role-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            background: #09090b;
            padding: 4px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 24px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: #a1a1aa;
            padding: 10px 12px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.8px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .tab-btn.active {
            background: #8f1519;
            color: #ffffff;
            box-shadow: 0 2px 8px rgba(143, 21, 25, 0.4);
        }

        /* Form Fields */
        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #d1d5db;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .form-input {
            width: 100%;
            background: #18181b;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            padding: 12px 14px;
            font-size: 0.85rem;
            color: #ffffff;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .form-input::placeholder {
            color: #52525b;
            font-size: 0.8rem;
        }

        .form-input:focus {
            border-color: #8f1519;
            box-shadow: 0 0 0 2px rgba(143, 21, 25, 0.25);
        }

        /* Action Button */
        .submit-btn {
            width: 100%;
            background: #8f1519;
            border: none;
            border-radius: 6px;
            padding: 12px;
            color: #ffffff;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 8px;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .submit-btn:hover {
            background: #a81a1e;
        }

        .submit-btn:active {
            transform: scale(0.99);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <!-- Header & Logo Section -->
        <div class="brand-header">
            <div class="brand-logo-wrapper">
                <img src="static/logo.png" alt="Knife & Ember Logo" class="brand-logo">
            </div>
            <h1 class="brand-title">Knife & Ember Command Center</h1>
            <span class="brand-subtitle">F&B Management Platform</span>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <!-- Role Selector Tabs -->
            <div class="role-tabs">
                <button class="tab-btn active" type="button">Business Owner</button>
                <button class="tab-btn" type="button">Kitchen Terminal</button>
            </div>

            <!-- Form -->
            <form action="#" method="POST">
                <div class="form-group">
                    <label class="form-label" for="username">Store Username</label>
                    <input type="text" id="username" class="form-input" placeholder="Enter store username" required autocomplete="off">
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter password" required>
                </div>

                <button type="submit" class="submit-btn">Sign In as Business Owner</button>
            </form>
        </div>
    </div>

</body>
</html>
