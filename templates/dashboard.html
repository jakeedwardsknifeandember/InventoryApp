{% extends 'base.html' %}
{% block content %}
<div class="text-center">
    <h2 class="mb-4" style="font-weight: bold;">Dashboard</h2>
    
    <div class="d-flex justify-content-center gap-4 flex-wrap mb-5">
        <div class="content-card text-center" style="width: 240px; background-color: #3b8ed0; border: none;">
            <div style="font-size: 14px;">Total Products</div>
            <h2 style="margin: 0; font-weight: bold;">{{ total_products }}</h2>
        </div>
        <div class="content-card text-center" style="width: 240px; background-color: #2fa572; border: none;">
            <div style="font-size: 14px;">Total Revenue</div>
            <h2 style="margin: 0; font-weight: bold;">₱{{ "%.2f"|format(total_revenue) }}</h2>
        </div>
        <div class="content-card text-center" style="width: 240px; background-color: #727d82; border: none;">
            <div style="font-size: 14px;">Low Stock Items</div>
            <h2 style="margin: 0; font-weight: bold;">{{ low_stock_count }}</h2>
        </div>
        <div class="content-card text-center" style="width: 240px; background-color: #727d82; border: none;">
            <div style="font-size: 14px;">Total Expenses</div>
            <h2 style="margin: 0; font-weight: bold;">₱{{ "%.2f"|format(total_expenses) }}</h2>
        </div>
    </div>

    <a href="/portal/{{ username }}/sales" class="btn btn-primary px-4 py-2" style="font-weight: bold;">💰 Open POS Sales Register</a>
</div>
{% endblock %}
